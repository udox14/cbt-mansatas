name = "cbt-pmb-worker"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[vars]
JWT_SECRET = "GANTI_DENGAN_SECRET_YANG_KUAT_MIN_32_KARAKTER"
CORS_ORIGIN = "https://cbt.example.com"

# Bind ke database PMB EXISTING — JANGAN buat baru!
[[d1_databases]]
binding = "DB"
database_name = "pmb-man1-tasik"
database_id = "b28a3f9e-331d-4bd2-9b85-95b12d6f313f"

# R2 untuk media soal
[[r2_buckets]]
binding = "R2"
bucket_name = "cbt-media"
