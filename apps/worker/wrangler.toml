name = "cbtmansatas"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[vars]
# ⚠️  JWT_SECRET TIDAK boleh di sini!
# Jalankan sekali: wrangler secret put JWT_SECRET
# Lalu masukkan secret baru yang kuat (random 64 hex chars)
CORS_ORIGIN = "https://cbtmansatas.pages.dev,https://cbt.man1tasikmalaya.sch.id"

# Bind ke database PMB EXISTING — JANGAN buat baru!
[[d1_databases]]
binding = "DB"
database_name = "pmb-man1-tasik"
database_id = "b28a3f9e-331d-4bd2-9b85-95b12d6f313f"

# R2 untuk media soal
[[r2_buckets]]
binding = "R2"
bucket_name = "cbt-media"

# KV untuk rate limiting (login & token validation)
# Buat dengan: wrangler kv:namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "e32aa93b3aae4ccdbdad04049e3f628c"
